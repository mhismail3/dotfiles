  - id: private-internet-access
    name: Private Internet Access
    source: brew_cask
    package: private-internet-access
    app_path: /Applications/Private Internet Access.app
    priority: 160
    setup_phase: network
    purpose: VPN for public or untrusted networks.
    desired_state: verify
    automated:
      - Installed by Brewfile.
      - Quarantine repair and Homebrew adopt are attempted by setup.sh when needed.
      - setup.sh applies the supported piactl baseline of OpenVPN, auto region, LAN traffic allowed, port forwarding off, and debug logging off.
      - setup.sh applies non-secret client UI preferences for no connect-on-launch, desktop notifications on, dark theme, system tray icon, and latency-sorted regions.
    manual:
      - Sign in to PIA.
      - Connect and disconnect once after sign-in to verify the VPN works.
      - Confirm normal VPN Kill Switch is enabled.
      - Enable Advanced Kill Switch only if you want always-on VPN behavior even when disconnected.
      - Enable PIA MACE, split tunneling, automation rules, or a specific region only if there is a concrete need.
      - After changing PIA network, kill switch, automation, or split tunnel behavior, verify Tailscale can still reach `mooses-macbook-server`.
    verify:
      commands:
        - test -d "/Applications/Private Internet Access.app"
        - 'command -v piactl >/dev/null'
        - 'piactl get connectionstate >/dev/null'
      user_checks:
        - PIA can connect and disconnect successfully.
    state_locations:
      - ~/Library/Application Support/com.privateinternetaccess.vpn
      - ~/Library/Preferences/com.privateinternetaccess.vpn/clientsettings.json
      - /Library/Application Support/com.privateinternetaccess.vpn
    notes:
      - piactl is the supported automation surface for daemon preferences.
      - VPN credentials, account state, dedicated IP tokens, and privileged daemon support files are not tracked.
      - Kill switch, Advanced Kill Switch, MACE, and split tunnel filter state are verified manually unless a stable supported interface is found.
      - Tailscale remote-control reliability has priority over PIA hardening; do not enable always-on VPN or Advanced Kill Switch without testing the Tailscale server path.
      - Login was completed through 1Password credential handoff on this Mac; connect/disconnect is left user-confirmed because it changes network routing.


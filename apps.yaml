version: 1
last_reviewed: "2026-06-27"
source_of_truth:
  installs: Brewfile
  bootstrap: setup.sh
  macos_preferences: .macos
status_values:
  - ready
  - needs_login
  - needs_permissions
  - needs_config
  - optional
  - verify
principles:
  - Track app setup requirements in this file before relying on memory.
  - Automate stable install, Dock, login item, CLI, and defaults behavior.
  - Keep credentials, tokens, account IDs, and generated app state out of git.
  - Record privacy, auth, and vendor-onboarding boundaries as manual steps.
  - Add a verification check whenever a setup step can be checked repeatably.

apps:
  - id: 1password
    name: 1Password
    source: brew_cask
    package: 1password
    app_path: /Applications/1Password.app
    priority: 10
    setup_phase: identity
    purpose: Password manager and secret handoff for the rest of setup.
    desired_state: verify
    automated:
      - Installed by Brewfile.
      - Added to Dock by .macos.
      - Added to Login Items by .macos.
    manual:
      - Sign in to the 1Password account.
      - Enable unlock method preferences.
      - Install or enable the Chrome browser extension after Chrome setup.
    verify:
      commands:
        - test -d "/Applications/1Password.app"
      user_checks:
        - 1Password opens and can unlock the primary vault.
        - Chrome can access the 1Password extension.
    state_locations:
      - ~/Library/Group Containers/2BUA8C4S2C.com.1password
    notes:
      - Do not store 1Password account details, recovery keys, or vault metadata in this repo.
      - Prefer 1Password Quick Access (`Cmd+Shift+Space`) for agent credential handoff so username/password can be copied without opening full item details.
      - Agents may paste copied credentials into target apps, then clear the clipboard, but must not reveal fields or print clipboard contents.


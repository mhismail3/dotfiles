  - id: synology-drive
    name: Synology Drive
    source: brew_cask
    package: synology-drive
    app_path: /Applications/Synology Drive Client.app
    priority: 70
    setup_phase: storage
    purpose: NAS sync for personal files that live outside git.
    desired_state: verify
    automated:
      - Installed by Brewfile.
      - File event notifications are disabled by setup.sh after the sync database exists.
      - Minimalist menu bar icon is enabled by setup.sh after the sync database exists.
    manual:
      - Sign in to the Synology server.
      - Create a sync task named SynologyDrive.
      - Select the local parent folder /Users/moose.
      - Uncheck "Create an empty SynologyDrive folder" when choosing the local folder.
      - Use the Synology home share at remote path / unless deliberately changing the standard layout.
      - Confirm ~/SynologyDrive exists as a symlink to ~/Library/CloudStorage/SynologyDrive-SynologyDrive.
    verify:
      commands:
        - test -d "/Applications/Synology Drive Client.app"
        - test -f "$HOME/Library/Application Support/SynologyDrive/data/db/sys.sqlite"
        - test -L "$HOME/SynologyDrive"
      user_checks:
        - Synology Drive status is healthy.
        - ~/SynologyDrive opens in Finder and shows expected synced files.
    state_locations:
      - ~/Library/Application Support/SynologyDrive
      - ~/Library/Application Support/SynologyDrive/data/db/sys.sqlite
      - ~/Library/CloudStorage/SynologyDrive-SynologyDrive
      - ~/SynologyDrive
    notes:
      - app-status.sh verifies the standard sync task with a redacted SQLite query against session_table.
      - setup.sh only updates the non-secret system_table keys enable_desktop_notification and use_black_white_icon.
      - Do not copy SynologyDrive config or database files into dotfiles; they include server, account, session, private-key, and File Provider state.
      - Server address, credentials, generated sync state, and sync contents are not tracked in dotfiles.
      - Standard SynologyDrive sync task and preferred UI toggles were verified on this Mac.

  - id: docker
    name: Docker Desktop
    source: brew_cask
    package: docker-desktop
    app_path: /Applications/Docker.app
    command: docker
    priority: 80
    setup_phase: development
    purpose: Containers for local development.
    desired_state: verify
    automated:
      - Installed by Brewfile.
      - Docker CLI and recommended first-run state are verified by app-status.sh.
    manual:
      - Launch Docker Desktop once to complete onboarding.
      - Use Docker's recommended settings.
      - Keep "Start Docker Desktop when you sign in" disabled unless always-on containers become necessary.
      - Sign in only if Docker Hub auth, private images, or higher Hub limits are needed.
    verify:
      commands:
        - test -d "/Applications/Docker.app"
        - command -v docker
        - docker info >/dev/null
        - test "$(docker context show)" = "desktop-linux"
        - test -L /var/run/docker.sock
        - jq -e '.AutoStart == false and .UseContainerdSnapshotter == true' "$HOME/Library/Group Containers/group.com.docker/settings-store.json" >/dev/null
      user_checks:
        - Docker Desktop reports "Docker is running".
        - docker ps succeeds after launch.
        - Docker Hub sign-in is skipped unless actually needed.
    state_locations:
      - ~/Library/Group Containers/group.com.docker
      - ~/.docker
    notes:
      - Recommended settings created /var/run/docker.sock as a compatibility symlink to ~/.docker/run/docker.sock.
      - The standard baseline keeps Docker Desktop out of Login Items to avoid unnecessary battery and memory use.
      - Keep Docker credentials and generated container state out of this repo.

